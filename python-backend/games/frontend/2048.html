<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: #faf8ef;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }
        
        h1 {
            color: #776e65;
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        .score-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .score-box {
            background: #bbada0;
            padding: 10px 20px;
            border-radius: 6px;
            color: white;
            text-align: center;
        }
        
        .score-box span {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
        }
        
        .score-box strong {
            font-size: 24px;
        }
        
        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }
        
        button {
            background: #8f7a66;
            color: #f9f6f2;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        button:hover {
            background: #9f8a76;
        }
        
        .game-container {
            background: #bbada0;
            border-radius: 10px;
            padding: 10px;
            position: relative;
        }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 100px);
            grid-template-rows: repeat(4, 100px);
            gap: 10px;
        }
        
        .grid-cell {
            background: rgba(238, 228, 218, 0.35);
            border-radius: 6px;
            width: 100px;
            height: 100px;
        }
        
        .tile-container {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
        }
        
        .tile {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 35px;
            font-weight: bold;
            transition: all 0.15s ease-in-out;
        }
        
        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 30px; }
        .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 30px; }
        .tile-512 { background: #edc850; color: #f9f6f2; font-size: 30px; }
        .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 25px; }
        .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 25px; }
        .tile-super { background: #3c3a32; color: #f9f6f2; font-size: 20px; }
        
        .instructions {
            margin-top: 20px;
            color: #776e65;
            text-align: center;
            line-height: 1.6;
        }
        
        .game-over, .game-won {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(238, 228, 218, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            z-index: 100;
        }
        
        .game-over h2, .game-won h2 {
            font-size: 48px;
            color: #776e65;
            margin-bottom: 20px;
        }
        
        .hidden {
            display: none !important;
        }
        
        .back-link {
            margin-top: 20px;
            color: #8f7a66;
            text-decoration: none;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>2048</h1>
    
    <div class="score-container">
        <div class="score-box">
            <span>Score</span>
            <strong id="score">0</strong>
        </div>
        <div class="score-box">
            <span>Best</span>
            <strong id="best">0</strong>
        </div>
    </div>
    
    <div class="controls">
        <button onclick="newGame()">New Game</button>
    </div>
    
    <div class="game-container">
        <div class="grid-container">
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
        </div>
        <div class="tile-container" id="tileContainer"></div>
        
        <div class="game-over hidden" id="gameOver">
            <h2>Game Over!</h2>
            <button onclick="newGame()">Try Again</button>
        </div>
        
        <div class="game-won hidden" id="gameWon">
            <h2>You Win!</h2>
            <button onclick="continueGame()">Continue</button>
            <button onclick="newGame()">New Game</button>
        </div>
    </div>
    
    <div class="instructions">
        <p><strong>HOW TO PLAY:</strong> Use your arrow keys or swipe to move the tiles.</p>
        <p>When two tiles with the same number touch, they merge into one!</p>
    </div>
    
    <a href="/" class="back-link">← Back to Games</a>

    <script>
        let gameId = null;
        let bestScore = localStorage.getItem('2048-best') || 0;
        document.getElementById('best').textContent = bestScore;

        async function newGame() {
            try {
                const response = await fetch('/api/2048/new', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'}
                });
                const data = await response.json();
                gameId = data.game_id;
                updateBoard(data.state);
                document.getElementById('gameOver').classList.add('hidden');
                document.getElementById('gameWon').classList.add('hidden');
            } catch (error) {
                console.error('Error starting game:', error);
                alert('Failed to start game. Is the server running?');
            }
        }

        function updateBoard(state) {
            const container = document.getElementById('tileContainer');
            container.innerHTML = '';
            
            document.getElementById('score').textContent = state.score;
            
            if (state.score > bestScore) {
                bestScore = state.score;
                localStorage.setItem('2048-best', bestScore);
                document.getElementById('best').textContent = bestScore;
            }
            
            if (state.game_over) {
                document.getElementById('gameOver').classList.remove('hidden');
            }
            
            if (state.won) {
                document.getElementById('gameWon').classList.remove('hidden');
            }
            
            state.board.forEach((row, i) => {
                row.forEach((value, j) => {
                    if (value !== 0) {
                        const tile = document.createElement('div');
                        tile.className = `tile tile-${value <= 2048 ? value : 'super'}`;
                        tile.textContent = value;
                        tile.style.left = `${j * 110}px`;
                        tile.style.top = `${i * 110}px`;
                        container.appendChild(tile);
                    }
                });
            });
        }

        async function move(direction) {
            if (!gameId || document.getElementById('gameOver').classList.contains('hidden') === false) {
                return;
            }
            
            try {
                const response = await fetch(`/api/2048/${gameId}/move`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({direction: direction})
                });
                const data = await response.json();
                updateBoard(data);
            } catch (error) {
                console.error('Error moving:', error);
            }
        }

        function continueGame() {
            document.getElementById('gameWon').classList.add('hidden');
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp':
                    e.preventDefault();
                    move('UP');
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    move('DOWN');
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    move('LEFT');
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    move('RIGHT');
                    break;
            }
        });

        // Touch controls
        let touchStartX = 0;
        let touchStartY = 0;
        
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        
        document.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 0) move('RIGHT');
                else move('LEFT');
            } else {
                if (dy > 0) move('DOWN');
                else move('UP');
            }
        });

        // Start game on load
        newGame();
    </script>
</body>
</html>
