<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🟫 跳一跳</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 120, 72, 0.25), transparent 38%),
        radial-gradient(circle at 85% 5%, rgba(73, 165, 255, 0.28), transparent 38%),
        linear-gradient(140deg, #071328 0%, #111a34 50%, #19112c 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: "Avenir Next", "PingFang SC", sans-serif;
      color: #eaf2ff;
      padding: 14px;
      overflow: hidden;
    }
    .game-shell {
      width: min(420px, 100%);
      max-height: calc(100vh - 18px);
      background: rgba(10, 20, 40, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 20px;
      padding: 14px;
      backdrop-filter: blur(8px);
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.35);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    canvas { width: min(230px, 62vw); height: auto; border: 1px solid rgba(173, 214, 255, 0.4); border-radius: 12px; background: #f5f0e7; }
    #score { width: min(360px, 92vw); text-align: right; font-size: 14px; color: #b7cced; }
    #controls { width: min(360px, 92vw); display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .btn { width: 100%; height: 38px; border: none; border-radius: 10px; background: rgba(37, 53, 85, 0.95); color: #eef5ff; font-size: 17px; font-weight: 700; }
    .btn:active { transform: translateY(1px); filter: brightness(1.08); }
  </style>
</head>
<body>
  <div class="game-shell">
    <div id="score">得分: <span>0</span></div>
    <canvas id="c" width="360" height="500"></canvas>
    <div id="controls">
      <button class="btn" id="startBtn" onclick="startGame()">▶</button>
      <button class="btn" id="pauseBtn" onclick="pauseGame()">⏸</button>
      <button class="btn" id="restartBtn" onclick="restartGame()">↺</button>
    </div>
  </div>
  <script>
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');
    let running = 0, paused = 0;
    let score = 0;
    let charging = 0;
    let power = 0;
    let player = { x: 90, y: 360, size: 20 };
    let from = { x: 70, y: 390, w: 70 };
    let to = { x: 210, y: 350, w: 80 };

    function newTarget() {
      const gap = 90 + Math.random() * 80;
      const width = 66 + Math.random() * 30;
      const height = 300 + Math.random() * 100;
      to = { x: from.x + gap, y: height, w: width };
      if (to.x + to.w > 340) {
        to.x = 210;
      }
    }

    function drawPlatform(p, color) {
      ctx.fillStyle = color;
      ctx.fillRect(p.x, p.y, p.w, 14);
      ctx.fillStyle = 'rgba(0,0,0,0.1)';
      ctx.fillRect(p.x, p.y + 14, p.w, 6);
    }

    function draw() {
      ctx.fillStyle = '#f5f0e7';
      ctx.fillRect(0, 0, c.width, c.height);
      drawPlatform(from, '#5e80b8');
      drawPlatform(to, '#94b3e2');

      ctx.fillStyle = '#2f3b53';
      ctx.fillRect(player.x, player.y, player.size, player.size);

      if (charging) {
        ctx.fillStyle = '#ff914d';
        ctx.fillRect(16, 18, Math.min(power * 1.4, 180), 8);
      }

      if (!running && !paused) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
        ctx.fillRect(0, 0, c.width, c.height);
        ctx.fillStyle = '#223352';
        ctx.font = '20px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('按住蓄力，松开起跳', c.width / 2, 95);
        ctx.textAlign = 'left';
      }
    }

    function landCheck(nx) {
      const center = nx + player.size / 2;
      const left = to.x;
      const right = to.x + to.w;
      return center >= left && center <= right;
    }

    function normalizeRound() {
      // 避免平台坐标不断向右漂移，导致目标回到玩家后方或超出可见区。
      const baseline = 70;
      from = { x: baseline, y: from.y, w: from.w };
      player.x = from.x + from.w / 2 - player.size / 2;
      player.y = from.y - 30;
      newTarget();
    }

    function jump() {
      if (!running || paused) return;
      const distance = 34 + power * 0.75;
      const nx = player.x + distance;
      const ny = player.y - distance * 0.28;
      const ok = landCheck(nx);

      player.x = nx;
      player.y = ny;
      draw();

      setTimeout(() => {
        if (ok) {
          score += 1;
          document.querySelector('#score span').textContent = score;
          from = { ...to };
          normalizeRound();
          draw();
        } else {
          running = 0;
          paused = 0;
          draw();
          ctx.fillStyle = 'rgba(0,0,0,0.35)';
          ctx.fillRect(0,0,c.width,c.height);
          ctx.fillStyle = '#e74c3c';
          ctx.font = '24px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText('失败了', c.width / 2, 95);
          ctx.font = '14px sans-serif';
          ctx.fillStyle = '#ffffff';
          ctx.fillText('得分: ' + score, c.width / 2, 120);
        }
      }, 140);
    }

    function startGame() {
      if (!running) {
        running = 1;
        paused = 0;
      } else if (paused) {
        paused = 0;
        running = 1;
      }
    }

    function pauseGame() {
      if (running) {
        running = 0;
        paused = 1;
      } else if (paused) {
        paused = 0;
        running = 1;
      }
    }

    function restartGame() {
      running = 0;
      paused = 0;
      score = 0;
      power = 0;
      charging = 0;
      player = { x: 90, y: 360, size: 20 };
      from = { x: 70, y: 390, w: 70 };
      to = { x: 210, y: 350, w: 80 };
      document.querySelector('#score span').textContent = 0;
      draw();
    }

    function chargeStart() {
      if (!running || paused) return;
      charging = 1;
      power = 0;
      const timer = setInterval(() => {
        if (!charging) {
          clearInterval(timer);
          return;
        }
        power = Math.min(power + 2.4, 120);
        draw();
      }, 16);
    }

    function chargeEnd() {
      if (!charging) return;
      charging = 0;
      jump();
      power = 0;
    }

    c.addEventListener('mousedown', chargeStart);
    c.addEventListener('mouseup', chargeEnd);
    c.addEventListener('touchstart', e => { e.preventDefault(); chargeStart(); }, { passive: false });
    c.addEventListener('touchend', e => { e.preventDefault(); chargeEnd(); }, { passive: false });

    document.addEventListener('keydown', e => {
      if (e.key === ' ') {
        e.preventDefault();
        if (!running) {
          startGame();
        } else {
          chargeStart();
        }
      }
    });
    document.addEventListener('keyup', e => {
      if (e.key === ' ') {
        e.preventDefault();
        chargeEnd();
      }
    });

    draw();
  </script>
</body>
</html>
