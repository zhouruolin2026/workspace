<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🦖 小恐龙快跑</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 120, 72, 0.25), transparent 38%),
        radial-gradient(circle at 85% 5%, rgba(73, 165, 255, 0.28), transparent 38%),
        linear-gradient(140deg, #071328 0%, #111a34 50%, #19112c 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: "Avenir Next", "PingFang SC", sans-serif;
      color: #eaf2ff;
      padding: 14px;
    }
    .game-shell {
      width: min(420px, 100%);
      background: rgba(10, 20, 40, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 20px;
      padding: 14px;
      backdrop-filter: blur(8px);
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.35);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    canvas { width: min(360px, 92vw); height: auto; border: 1px solid rgba(173, 214, 255, 0.4); border-radius: 12px; background: #edf5ff; }
    #score { width: min(360px, 92vw); text-align: right; font-size: 14px; color: #b7cced; }
    #controls { width: min(360px, 92vw); display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .btn { width: 100%; height: 38px; border: none; border-radius: 10px; background: rgba(37, 53, 85, 0.95); color: #eef5ff; font-size: 17px; font-weight: 700; }
  </style>
</head>
<body>
  <div class="game-shell">
    <div id="score">得分: <span>0</span></div>
    <canvas id="c" width="360" height="200"></canvas>
    <div id="controls">
      <button class="btn" id="startBtn" onclick="startGame()">⏻</button>
      <button class="btn" id="pauseBtn" onclick="pauseGame()">⏸</button>
      <button class="btn" id="restartBtn" onclick="restartGame()">↺</button>
    </div>
  </div>
  <script>
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');
    let running = 0, paused = 0;
    let dinoY = 150, vy = 0, gravity = 0.6;
    let obstacles = [];
    let score = 0;
    let speed = 4;

    function draw() {
      ctx.fillStyle = '#edf5ff';
      ctx.fillRect(0, 0, c.width, c.height);
      ctx.strokeStyle = '#8fb0d8';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, 170);
      ctx.lineTo(c.width, 170);
      ctx.stroke();

      ctx.fillStyle = '#1e2f56';
      ctx.fillRect(50, dinoY, 22, 22);
      ctx.fillRect(68, dinoY + 7, 10, 8);

      ctx.fillStyle = '#3768b3';
      obstacles.forEach(o => ctx.fillRect(o.x, 170 - o.h, 14, o.h));

      if (!running && !paused) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
        ctx.fillRect(0, 0, c.width, c.height);
        ctx.fillStyle = '#1e2f56';
        ctx.font = '20px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('空格或点击跳跃', c.width / 2, 95);
        ctx.textAlign = 'left';
      }
    }

    function step() {
      if (!running || paused) return;

      vy += gravity;
      dinoY += vy;
      if (dinoY > 148) {
        dinoY = 148;
        vy = 0;
      }

      if (obstacles.length === 0 || obstacles[obstacles.length - 1].x < 230) {
        obstacles.push({ x: 370, h: Math.random() < 0.5 ? 30 : 42 });
      }

      obstacles.forEach(o => o.x -= speed);
      obstacles = obstacles.filter(o => o.x > -20);

      for (const o of obstacles) {
        const hitX = o.x < 72 && o.x + 14 > 50;
        const hitY = dinoY + 22 > 170 - o.h;
        if (hitX && hitY) {
          running = 0;
          paused = 0;
          draw();
          ctx.fillStyle = 'rgba(0,0,0,0.35)';
          ctx.fillRect(0,0,c.width,c.height);
          ctx.fillStyle = '#e74c3c';
          ctx.font = '24px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText('游戏结束', c.width / 2, 95);
          ctx.font = '14px sans-serif';
          ctx.fillStyle = '#ffffff';
          ctx.fillText('得分: ' + score, c.width / 2, 120);
          return;
        }
      }

      score += 1;
      document.querySelector('#score span').textContent = Math.floor(score / 8);
      draw();
      requestAnimationFrame(step);
    }

    function jump() {
      if (!running) startGame();
      if (dinoY >= 148) vy = -9.2;
    }

    function startGame() {
      if (!running) {
        running = 1;
        paused = 0;
        step();
      } else if (paused) {
        paused = 0;
        running = 1;
        step();
      }
    }

    function pauseGame() {
      if (running) {
        running = 0;
        paused = 1;
      } else if (paused) {
        paused = 0;
        running = 1;
        step();
      }
    }

    function restartGame() {
      running = 0;
      paused = 0;
      dinoY = 150;
      vy = 0;
      obstacles = [];
      score = 0;
      document.querySelector('#score span').textContent = 0;
      draw();
    }

    c.addEventListener('click', jump);
    document.addEventListener('keydown', e => {
      if (e.key === ' ' || e.key === 'ArrowUp') {
        e.preventDefault();
        jump();
      }
    });

    draw();
  </script>
</body>
</html>
