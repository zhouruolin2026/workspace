<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🎯 2048</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 120, 72, 0.25), transparent 38%),
        radial-gradient(circle at 85% 5%, rgba(73, 165, 255, 0.28), transparent 38%),
        linear-gradient(140deg, #071328 0%, #111a34 50%, #19112c 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: "Avenir Next", "PingFang SC", sans-serif;
      color: #eaf2ff;
      padding: 14px;
    }
    .game-shell {
      width: min(420px, 100%);
      background: rgba(10, 20, 40, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 20px;
      padding: 14px;
      backdrop-filter: blur(8px);
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.35);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    #grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 9px; background: #293e67; padding: 12px; border-radius: 12px; }
    .cell { width: 76px; height: 76px; background: #172746; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; }
    .c2{background:#eee4da;color:#776e65}.c4{background:#ede0c8;color:#776e65}.c8{background:#f2b179;color:#fff}.c16{background:#f59563;color:#fff}.c32{background:#f67c5f;color:#fff}.c64{background:#f65e3b;color:#fff}.c128{background:#edcf72;color:#fff}.c256{background:#edcc61;color:#fff}.c512{background:#edc850;color:#fff}.c1024{background:#edc53f;color:#fff}.c2048{background:#edc22e;color:#fff}
    #hud { width: min(380px, 96vw); display: flex; justify-content: flex-end; align-items: center; }
    #score { color: #b7cced; font-size: 14px; text-align: right; }
    .btn { width: 100%; height: 38px; border: none; border-radius: 10px; background: rgba(37, 53, 85, 0.95); color: #eef5ff; font-size: 17px; font-weight: 700; }
    #controls { width: min(380px, 96vw); display: flex; flex-direction: column; align-items: center; gap: 8px; }
    #mainControls { width: min(380px, 96vw); display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .dpad-row { display: flex; gap: 8px; }
    .dpad-btn { width: 74px; height: 44px; border: none; border-radius: 10px; background: rgba(37, 53, 85, 0.95); color: #eef5ff; font-size: 18px; }
    .dpad-btn:active { background: rgba(24, 36, 60, 0.95); }
  </style>
</head>
<body>
  <div class="game-shell">
    <div id="grid"></div>
    <div id="hud">
      <div id="score">得分: <span id="s">0</span></div>
    </div>
    <div id="controls">
      <div class="dpad-row">
        <button class="dpad-btn" id="upBtn" onclick="move(0)">▲</button>
      </div>
      <div class="dpad-row">
        <button class="dpad-btn" id="leftBtn" onclick="move(2)">◀</button>
        <button class="dpad-btn" id="downBtn" onclick="move(1)">▼</button>
        <button class="dpad-btn" id="rightBtn" onclick="move(3)">▶</button>
      </div>
    </div>
    <div id="mainControls">
      <button class="btn" id="startBtn" aria-label="开始" onclick="startGame()">⏻</button>
      <button class="btn" id="pauseBtn" aria-label="暂停" onclick="pauseGame()">⏸</button>
      <button class="btn" id="restartBtn" aria-label="重开" onclick="restartGame()">↺</button>
    </div>
  </div>
  <script>
    let board=[],score=0,running=0,paused=0;
    function init(){board=Array(4).fill().map(()=>Array(4).fill(0));score=0;add();add();draw()}
    function add(){let e=[];for(let i=0;i<4;i++)for(let j=0;j<4;j++)if(!board[i][j])e.push([i,j]);if(e.length){let p=e[Math.floor(Math.random()*e.length)];board[p[0]][p[1]]=Math.random()<0.9?2:4}}
    function draw(){let g=document.getElementById('grid');g.innerHTML='';for(let i=0;i<4;i++)for(let j=0;j<4;j++){let d=document.createElement('div');d.className='cell'+(board[i][j]?' c'+board[i][j]:'');d.textContent=board[i][j]||'';g.appendChild(d)}document.getElementById('s').textContent=score}
    function slide(row){let r=row.filter(x=>x);for(let i=0;i<r.length-1;i++){if(r[i]==r[i+1]){r[i]*=2;score+=r[i];r.splice(i+1,1)}}while(r.length<4)r.push(0);return r}
    function move(d){
      if(!running||paused)return;
      let old=JSON.stringify(board);
      if(d==0){for(let i=0;i<4;i++){let col=[board[0][i],board[1][i],board[2][i],board[3][i]];col=slide(col);for(let j=0;j<4;j++)board[j][i]=col[j]}}
      else if(d==1){for(let i=0;i<4;i++){let col=[board[0][i],board[1][i],board[2][i],board[3][i]];col.reverse();col=slide(col);col.reverse();for(let j=0;j<4;j++)board[j][i]=col[j]}}
      else if(d==2){for(let i=0;i<4;i++)board[i]=slide(board[i])}
      else if(d==3){for(let i=0;i<4;i++){board[i]=board[i].reverse();board[i]=slide(board[i]);board[i]=board[i].reverse()}}
      if(JSON.stringify(board)!=old){add();draw()}
    }
    function startGame(){ if(!running){ running=1; paused=0; } else if(paused){ paused=0; } }
    function pauseGame(){ if(running) paused = paused?0:1; }
    function restartGame(){ init(); running=0; paused=0; }
    let sx,sy;document.ontouchstart=e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY};
    document.ontouchend=e=>{let dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;if(Math.abs(dx)>Math.abs(dy)){if(dx>30)move(3);else if(dx<-30)move(2)}else{if(dy>30)move(1);else if(dy<-30)move(0)}};
    document.onkeydown=e=>{if(e.key=='ArrowUp')move(0);if(e.key=='ArrowDown')move(1);if(e.key=='ArrowLeft')move(2);if(e.key=='ArrowRight')move(3)};
    init();
  </script>
</body>
</html>
